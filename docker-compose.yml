# ============================================================================
# Omniflow — Local Development Services
# Usage:
#   docker compose up -d          # Start all services
#   docker compose down           # Stop all services (data preserved)
#   docker compose down -v        # Stop and wipe all volumes
# ============================================================================

version: '3.9'

services:

  # --------------------------------------------------------------------------
  # PostgreSQL 15
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: omniflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: omniflow
      POSTGRES_PASSWORD: omniflow_password
      POSTGRES_DB: omniflow_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U omniflow -d omniflow_dev']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - omniflow_net

  # --------------------------------------------------------------------------
  # Redis 7
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: omniflow_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omniflow_net

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Console:  http://localhost:9001  (login: minioadmin / minioadmin)
  # API:      http://localhost:9000
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: omniflow_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - omniflow_net

  # --------------------------------------------------------------------------
  # MinIO bucket initialiser — creates the default bucket on first run
  # --------------------------------------------------------------------------
  minio_init:
    image: minio/mc:latest
    container_name: omniflow_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/omniflow-assets-dev;
        mc anonymous set download local/omniflow-assets-dev/public;
        echo 'MinIO bucket omniflow-assets-dev ready.';
        exit 0;
      "
    networks:
      - omniflow_net

# ----------------------------------------------------------------------------
# Named volumes — data persists across container restarts
# ----------------------------------------------------------------------------
volumes:
  postgres_data:
    name: omniflow_postgres_data
  redis_data:
    name: omniflow_redis_data
  minio_data:
    name: omniflow_minio_data

# ----------------------------------------------------------------------------
# Network
# ----------------------------------------------------------------------------
networks:
  omniflow_net:
    name: omniflow_network
    driver: bridge
