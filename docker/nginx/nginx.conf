user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 50m;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=120r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream definitions ──────────────────────────────────────────────────
    upstream web_backend {
        server web:3000;
        keepalive 32;
    }

    upstream api_backend {
        server api:4000;
        keepalive 32;
    }

    upstream admin_backend {
        server admin:3001;
        keepalive 16;
    }

    # ── Proxy settings ────────────────────────────────────────────────────────
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_read_timeout 90s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 90s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;

    # ── SSL settings (ready for termination) ─────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Security headers map ──────────────────────────────────────────────────
    map $sent_http_content_type $cache_control {
        ~*text/html             "no-cache, no-store, must-revalidate";
        ~*application/json      "no-cache";
        ~*text/css              "public, max-age=31536000, immutable";
        ~*application/javascript "public, max-age=31536000, immutable";
        ~*image/                "public, max-age=2592000";
        ~*font/                 "public, max-age=31536000, immutable";
        default                 "public, max-age=86400";
    }

    # ── Main server block ─────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Redirect HTTP → HTTPS (enabled when SSL is configured)
        # return 301 https://$host$request_uri;

        server_name _;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss:;" always;
        add_header Cache-Control $cache_control;

        # ── Health check ──────────────────────────────────────────────────────
        location = /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ── API routes ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr 10;

            proxy_pass http://api_backend/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';

            # Strip /api prefix when passing to backend
            rewrite ^/api/(.*) /$1 break;
        }

        # ── Auth rate limiting ─────────────────────────────────────────────
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_conn addr 5;

            proxy_pass http://api_backend/auth/;
        }

        # ── WebSocket / Socket.IO ─────────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://api_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ── Admin panel ───────────────────────────────────────────────────
        location /admin/ {
            limit_req zone=general_limit burst=30 nodelay;

            # Restrict admin to internal networks in production
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;

            proxy_pass http://admin_backend/;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # ── Static assets with long-term caching ─────────────────────────
        location /_next/static/ {
            proxy_pass http://web_backend/_next/static/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location /static/ {
            proxy_pass http://web_backend/static/;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web_backend;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # ── Next.js frontend (catch-all) ──────────────────────────────────
        location / {
            limit_req zone=general_limit burst=60 nodelay;

            proxy_pass http://web_backend;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ── HTTPS server (uncomment and configure cert paths for SSL) ─────────────
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name yourdomain.com www.yourdomain.com;
    #
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_trusted_certificate /etc/nginx/certs/chain.pem;
    #
    #     add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    #
    #     # Same location blocks as above...
    # }
}
