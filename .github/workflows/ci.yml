name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --workspaces --if-present

      - name: Check formatting (Prettier)
        run: npm run format:check --workspaces --if-present

  # ── Type Check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared --if-present
          npm run build --workspace=packages/database --if-present

      - name: Type check API
        run: npx tsc --noEmit -p apps/api/tsconfig.json

      - name: Type check Web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache Jest
        uses: actions/cache@v4
        with:
          path: |
            .jest-cache
            apps/*/node_modules/.cache/jest
          key: jest-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: jest-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit --workspaces --if-present -- --ci --coverage --cacheDirectory=.jest-cache

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: "**/coverage"
          retention-days: 7

  # ── Integration Tests ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: omniflow_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: omniflow_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://omniflow_test:test_password@localhost:5432/omniflow_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: test-jwt-secret-at-least-32-chars-long
      JWT_REFRESH_SECRET: test-jwt-refresh-secret-at-least-32-chars-long
      ENCRYPTION_KEY: test-encryption-key-32-chars-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run build --workspace=packages/shared --if-present
          npm run build --workspace=packages/database --if-present

      - name: Run database migrations
        run: npm run migrate --workspace=packages/database --if-present
        env:
          DATABASE_URL: postgresql://omniflow_test:test_password@localhost:5432/omniflow_test

      - name: Run integration tests
        run: npm run test:integration --workspaces --if-present -- --ci --forceExit

  # ── Build API Docker image ────────────────────────────────────────────────────
  build-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          tags: omniflow-api:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ── Build Web Docker image ────────────────────────────────────────────────────
  build-web:
    name: Build Web Docker Image
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: false
          tags: omniflow-web:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=https://api.omniflow.io

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity only)
        run: npm audit --audit-level=high --workspace=apps/api --workspace=apps/web
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false
          load: true
          tags: omniflow-api:scan
          cache-from: type=gha

      - name: Trivy vulnerability scan (API image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "omniflow-api:scan"
          format: "sarif"
          output: "trivy-api.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-api.sarif"

  # ── CI Summary gate ──────────────────────────────────────────────────────────
  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-unit, test-integration, build-api, build-web, security-scan]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.typecheck.result }}" != "success" ||
                "${{ needs.test-unit.result }}" != "success" ||
                "${{ needs.test-integration.result }}" != "success" ||
                "${{ needs.build-api.result }}" != "success" ||
                "${{ needs.build-web.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
